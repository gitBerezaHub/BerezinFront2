<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НЕ_ПУПЫРКА.РУ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header__container">
      <a class="header__logo" href="#">НЕ_ПУПЫРКА.РУ</a>
      <nav class="header__nav">
        <a class="header__nav-link" href="#">О НАС</a>
        <a class="header__nav-link" href="#">СКИДКИ</a>
        <a class="header__nav-link" href="#">КОНТАКТЫ</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero__container">
      <div class="hero__content">
        <h1 class="hero__title">POP IT!</h1>
        <p class="hero__text">Лучшая игрушка-антистресс — бесконечные пульсации плёнки!</p>
        <a class="hero__btn" href="#">КУПИТЬ</a>
      </div>
      <img class="hero__image" src="images/background.png" alt="Pop It">
    </div>
  </section>

  <section class="products">
    <div class="products__container">
      <h2 class="products__title">Выбери свой Pop-It!</h2>
      <div class="products__grid">

        <div class="products__card">
          <img class="products__card-img" src="images/square.png" alt="Разноцветный квадратный">
          <p class="products__card-name">Разноцветный квадратный</p>
          <a class="products__card-btn" href="#">КУПИТЬ</a>
        </div>

        <div class="products__card">
          <img class="products__card-img" src="images/amongus.png" alt="Among Us неоновый">
          <p class="products__card-name">Among Us неоновый</p>
          <a class="products__card-btn" href="#">КУПИТЬ</a>
        </div>

        <div class="products__card">
          <img class="products__card-img" src="images/round.png" alt="Разноцветный круглый">
          <p class="products__card-name">Разноцветный круглый</p>
          <a class="products__card-btn" href="#">КУПИТЬ</a>
        </div>

      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer__container">
      <a class="footer__logo" href="#">НЕ_ПУПЫРКА.РУ</a>
      <nav class="footer__nav">
        <a class="footer__nav-link" href="#">Способы оплаты</a>
        <a class="footer__nav-link" href="#">Доставка</a>
        <a class="footer__nav-link" href="#">Опт</a>
        <a class="footer__nav-link" href="#">Контакты</a>
      </nav>
    </div>
  </footer>

</body>
</html>
